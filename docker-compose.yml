# 5-node raftkv cluster + Prometheus + Grafana.
#
#   docker compose up --build
#   docker compose exec node0 raftkv-cli -servers node0:7000,node1:7000,node2:7000,node3:7000,node4:7000 put k v
#   Grafana: http://localhost:3000 (anonymous, dashboard pre-provisioned)
#   Prometheus: http://localhost:9090
#
# Client ports are published as 7001..7005 -> node0..node4, so a host-side
# clerk uses -servers localhost:7001,...,localhost:7005.

x-node: &node
  build: .
  restart: unless-stopped

services:
  node0:
    <<: *node
    command: ["-id", "0", "-peers", "node0:7000,node1:7000,node2:7000,node3:7000,node4:7000", "-listen", ":7000", "-data", "/data", "-metrics", ":9100"]
    ports: ["7001:7000"]
    volumes: [node0-data:/data]
  node1:
    <<: *node
    command: ["-id", "1", "-peers", "node0:7000,node1:7000,node2:7000,node3:7000,node4:7000", "-listen", ":7000", "-data", "/data", "-metrics", ":9100"]
    ports: ["7002:7000"]
    volumes: [node1-data:/data]
  node2:
    <<: *node
    command: ["-id", "2", "-peers", "node0:7000,node1:7000,node2:7000,node3:7000,node4:7000", "-listen", ":7000", "-data", "/data", "-metrics", ":9100"]
    ports: ["7003:7000"]
    volumes: [node2-data:/data]
  node3:
    <<: *node
    command: ["-id", "3", "-peers", "node0:7000,node1:7000,node2:7000,node3:7000,node4:7000", "-listen", ":7000", "-data", "/data", "-metrics", ":9100"]
    ports: ["7004:7000"]
    volumes: [node3-data:/data]
  node4:
    <<: *node
    command: ["-id", "4", "-peers", "node0:7000,node1:7000,node2:7000,node3:7000,node4:7000", "-listen", ":7000", "-data", "/data", "-metrics", ":9100"]
    ports: ["7005:7000"]
    volumes: [node4-data:/data]

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3000:3000"]

volumes:
  node0-data:
  node1-data:
  node2-data:
  node3-data:
  node4-data:
